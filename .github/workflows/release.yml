name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and publish (e.g. v1.1.1)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Build Windows (signed updater)
    runs-on: windows-latest
    timeout-minutes: 90
    env:
      # Windows release builds are heavy; 2 jobs fits standard 2-vCPU runners.
      CARGO_BUILD_JOBS: 2
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Require updater signing secret
        shell: bash
        env:
          SIGNING_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$SIGNING_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is not set. Add it under Settings → Secrets → Actions."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          shared-key: knottrace-windows
          cache-on-failure: true

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Build Tauri bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # Keys from generate-updater-keys.sh have no password. GitHub cannot store
          # empty secrets, so omit TAURI_SIGNING_PRIVATE_KEY_PASSWORD unless the key is encrypted.
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseName: KnotTrace ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseBody: |
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.

            ### In-app updates
            KnotTrace checks `latest.json` on this release. Install from the app banner or download below.

            ### Windows
            - **KnotTrace MSI** — recommended
            - **NSIS setup.exe** — alternative installer
            
            ### Linux
            - **AppImage** — portable desktop app
            - **.deb** — Debian/Ubuntu package
            - **.rpm** — Fedora/RHEL package

            ### macOS
            - **.app.tar.gz** — app bundle archive
            - **.dmg** — standard macOS installer image
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true

  build-linux:
    name: Build Linux (signed updater)
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    env:
      CARGO_BUILD_JOBS: 2
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Require updater signing secret
        shell: bash
        env:
          SIGNING_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$SIGNING_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is not set. Add it under Settings → Secrets → Actions."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            build-essential \
            curl \
            wget \
            file \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          shared-key: knottrace-linux
          cache-on-failure: true

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Build Tauri bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseName: KnotTrace ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false

  build-macos:
    name: Build macOS (signed updater)
    runs-on: macos-latest
    timeout-minutes: 90
    env:
      CARGO_BUILD_JOBS: 2
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Require updater signing secret
        shell: bash
        env:
          SIGNING_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$SIGNING_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is not set. Add it under Settings → Secrets → Actions."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          shared-key: knottrace-macos
          cache-on-failure: true

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Build Tauri bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseName: KnotTrace ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
