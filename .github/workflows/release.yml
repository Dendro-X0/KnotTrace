name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and publish (e.g. v1.1.1)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: true

jobs:
  check-mobile-secrets:
    name: Check mobile signing secrets
    runs-on: ubuntu-latest
    outputs:
      android: ${{ steps.secrets.outputs.android }}
      ios: ${{ steps.secrets.outputs.ios }}
    steps:
      - id: secrets
        env:
          ANDROID_KEY_BASE64: ${{ secrets.ANDROID_KEY_BASE64 }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_MOBILE_PROVISION: ${{ secrets.IOS_MOBILE_PROVISION }}
        run: |
          android=false
          ios=false
          if [ -n "$ANDROID_KEY_BASE64" ] && [ -n "$ANDROID_KEY_PASSWORD" ] && [ -n "$ANDROID_KEY_ALIAS" ]; then
            android=true
          else
            echo "::notice::Android signing secrets not configured — skipping Build Android job. See docs/mobile-signing.md."
          fi
          if [ -n "$IOS_CERTIFICATE" ] && [ -n "$IOS_CERTIFICATE_PASSWORD" ] && [ -n "$IOS_MOBILE_PROVISION" ]; then
            ios=true
          else
            echo "::notice::iOS signing secrets not configured — skipping Build iOS job. See docs/mobile-signing.md."
          fi
          echo "android=$android" >> "$GITHUB_OUTPUT"
          echo "ios=$ios" >> "$GITHUB_OUTPUT"

  build-windows:
    name: Build Windows (signed updater)
    runs-on: windows-latest
    timeout-minutes: 90
    env:
      # Windows release builds are heavy; 2 jobs fits standard 2-vCPU runners.
      CARGO_BUILD_JOBS: 2
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Require updater signing secret
        shell: bash
        env:
          SIGNING_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$SIGNING_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is not set. Add it under Settings → Secrets → Actions."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          shared-key: knottrace-windows
          cache-on-failure: true

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Build Tauri bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # Keys from generate-updater-keys.sh have no password. GitHub cannot store
          # empty secrets, so omit TAURI_SIGNING_PRIVATE_KEY_PASSWORD unless the key is encrypted.
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseName: KnotTrace ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseBody: |
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.

            ### In-app updates
            KnotTrace checks `latest.json` on this release. Install from the app banner or download below.

            ### Windows
            - **KnotTrace MSI** — recommended
            - **NSIS setup.exe** — alternative installer
            
            ### Linux
            - **AppImage** — portable desktop app
            - **.deb** — Debian/Ubuntu package
            - **.rpm** — Fedora/RHEL package

            ### macOS
            - **.app.tar.gz** — app bundle archive
            - **.dmg** — standard macOS installer image

            ### Android
            - **Signed APK** — install after trusting the KnotTrace upload certificate

            ### iOS
            - **Signed IPA** — ad-hoc/enterprise distribution; install via profile trust
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true

  build-linux:
    name: Build Linux (signed updater)
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    env:
      CARGO_BUILD_JOBS: 2
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Require updater signing secret
        shell: bash
        env:
          SIGNING_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$SIGNING_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is not set. Add it under Settings → Secrets → Actions."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            build-essential \
            curl \
            wget \
            file \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          shared-key: knottrace-linux
          cache-on-failure: true

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Build Tauri bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseName: KnotTrace ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false

  build-macos:
    name: Build macOS (signed updater)
    runs-on: macos-latest
    timeout-minutes: 90
    env:
      CARGO_BUILD_JOBS: 2
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Require updater signing secret
        shell: bash
        env:
          SIGNING_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$SIGNING_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is not set. Add it under Settings → Secrets → Actions."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          shared-key: knottrace-macos
          cache-on-failure: true

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Build Tauri bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseName: KnotTrace ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false

  build-android:
    name: Build Android (signed APK)
    needs: check-mobile-secrets
    if: needs.check-mobile-secrets.outputs.android == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      CARGO_BUILD_JOBS: 2
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Require updater signing secret
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is not set."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            build-essential \
            curl \
            wget \
            file \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          shared-key: knottrace-android
          cache-on-failure: true

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Initialize Android project
        working-directory: apps/desktop
        run: npm run tauri android init --ci

      - name: Setup Android signing
        working-directory: apps/desktop/src-tauri/gen/android
        env:
          ANDROID_KEY_BASE64: ${{ secrets.ANDROID_KEY_BASE64 }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          echo "keyAlias=${ANDROID_KEY_ALIAS}" > keystore.properties
          echo "password=${ANDROID_KEY_PASSWORD}" >> keystore.properties
          echo "${ANDROID_KEY_BASE64}" | base64 -d > "$RUNNER_TEMP/knottrace.jks"
          echo "storeFile=$RUNNER_TEMP/knottrace.jks" >> keystore.properties

      - name: Patch Android release signing
        working-directory: apps/desktop/src-tauri/gen/android/app
        run: |
          python3 <<'PY'
          from pathlib import Path
          path = Path("build.gradle.kts")
          text = path.read_text()
          if 'signingConfigs' not in text:
              block = '''
          signingConfigs {
              create("release") {
                  val keystorePropertiesFile = rootProject.file("keystore.properties")
                  val keystoreProperties = java.util.Properties()
                  if (keystorePropertiesFile.exists()) {
                      keystoreProperties.load(java.io.FileInputStream(keystorePropertiesFile))
                  }
                  keyAlias = keystoreProperties["keyAlias"] as String
                  keyPassword = keystoreProperties["password"] as String
                  storeFile = file(keystoreProperties["storeFile"] as String)
                  storePassword = keystoreProperties["password"] as String
              }
          }
          '''
              text = text.replace("buildTypes {", block + "\n    buildTypes {", 1)
              text = text.replace(
                  'getByName("release") {',
                  'getByName("release") {\n            signingConfig = signingConfigs.getByName("release")',
                  1,
              )
              path.write_text(text)
          PY

      - name: Build Android APK
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}
        with:
          projectPath: apps/desktop
          mobile: android
          args: --target aarch64-linux-android
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseName: KnotTrace ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false

  build-ios:
    name: Build iOS (signed IPA)
    needs: check-mobile-secrets
    if: needs.check-mobile-secrets.outputs.ios == 'true'
    runs-on: macos-latest
    timeout-minutes: 120
    env:
      CARGO_BUILD_JOBS: 2
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Require updater signing secret
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is not set."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          shared-key: knottrace-ios
          cache-on-failure: true

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Initialize iOS project
        working-directory: apps/desktop
        run: npm run tauri ios init --ci

      - name: Import iOS signing assets
        env:
          IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_MOBILE_PROVISION: ${{ secrets.IOS_MOBILE_PROVISION }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          security create-keychain -p ci "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p ci "$KEYCHAIN"
          echo "$IOS_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/knottrace.p12"
          security import "$RUNNER_TEMP/knottrace.p12" -P "$IOS_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security list-keychain -d user -s "$KEYCHAIN"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "$IOS_MOBILE_PROVISION" | base64 --decode > "$HOME/Library/MobileDevice/Provisioning Profiles/knottrace.mobileprovision"

      - name: Build iOS IPA
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}
          IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_MOBILE_PROVISION: ${{ secrets.IOS_MOBILE_PROVISION }}
        with:
          projectPath: apps/desktop
          mobile: ios
          args: --target aarch64-apple-ios
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseName: KnotTrace ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
